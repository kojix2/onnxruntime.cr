name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu", "macos", "windows"]
        include:
          - os: ubuntu
            ort_platform: linux-x64
            archive_ext: tgz
          - os: macos
            ort_platform: osx-arm64
            archive_ext: tgz
          - os: windows
            ort_platform: win-x64
            archive_ext: zip

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Resolve ONNX Runtime version (non-Windows)
        if: ${{ matrix.os != 'windows' }}
        run: |
          if [ -z "$ORT_VERSION_TAG" ]; then
            ORT_VERSION_TAG=$(cat ONNXRUNTIME_VERSION)
          fi
          ORT_VERSION="${ORT_VERSION_TAG#v}"
          echo "ORT_VERSION_TAG=$ORT_VERSION_TAG" >> $GITHUB_ENV
          echo "ORT_VERSION=$ORT_VERSION" >> $GITHUB_ENV
          echo "ORT_RUNTIME_DIR=onnxruntime-${{ matrix.ort_platform }}-$ORT_VERSION" >> $GITHUB_ENV
          echo "ORT_URL=https://github.com/microsoft/onnxruntime/releases/download/$ORT_VERSION_TAG/onnxruntime-${{ matrix.ort_platform }}-$ORT_VERSION.${{ matrix.archive_ext }}" >> $GITHUB_ENV

      - name: Resolve ONNX Runtime version (Windows)
        if: ${{ matrix.os == 'windows' }}
        shell: pwsh
        run: |
          $tag = $env:ORT_VERSION_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = Get-Content ONNXRUNTIME_VERSION -Raw
            $tag = $tag.Trim()
          }
          $version = $tag.TrimStart('v')
          $runtimeDir = "onnxruntime-${{ matrix.ort_platform }}-$version"
          $url = "https://github.com/microsoft/onnxruntime/releases/download/$tag/onnxruntime-${{ matrix.ort_platform }}-$version.${{ matrix.archive_ext }}"
          "ORT_VERSION_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ORT_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ORT_RUNTIME_DIR=$runtimeDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ORT_URL=$url" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download onnxruntime (Linux/macOS)
        if: ${{ matrix.os != 'windows' }}
        run: |
          wget "$ORT_URL"
          tar -xvzf "$(basename "$ORT_URL")"

      - name: Download onnxruntime (Windows)
        if: ${{ matrix.os == 'windows' }}
        shell: pwsh
        run: |
          $url = $env:ORT_URL
          $archive = Split-Path $url -Leaf
          Invoke-WebRequest -Uri $url -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath . -Force

      - name: Configure runtime path (non-Windows)
        if: ${{ matrix.os != 'windows' }}
        run: echo "ONNXRUNTIME_DIR=${{ github.workspace }}/$ORT_RUNTIME_DIR" >> $GITHUB_ENV

      - name: Configure runtime path (Windows)
        if: ${{ matrix.os == 'windows' }}
        shell: pwsh
        run: |
          $runtime = Join-Path $PWD $env:ORT_RUNTIME_DIR
          if (-not (Test-Path $runtime)) {
            throw "Missing ONNX Runtime bundle at $runtime"
          }
          $libDir = Join-Path $runtime 'lib'
          $binDir = Join-Path $runtime 'bin'
          "ONNXRUNTIME_DIR=$runtime" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if (Test-Path $libDir) {
            "LIB=$libDir;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          if (Test-Path $binDir) {
            "PATH=$binDir;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          if (Test-Path $libDir) {
            "PATH=$libDir;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Inspect ONNX Runtime bundle (Windows)
        if: ${{ matrix.os == 'windows' }}
        shell: pwsh
        run: |
          $runtime = $env:ONNXRUNTIME_DIR
          Write-Host "ONNXRUNTIME_DIR=$runtime"
          if (-not (Test-Path $runtime)) { throw "Missing ONNX Runtime bundle at $runtime" }
          Get-ChildItem -Path $runtime -Depth 2 | ForEach-Object { $_.FullName }
          $dll = Get-ChildItem -Path $runtime -Recurse -Filter onnxruntime.dll | Select-Object -First 1
          if ($null -ne $dll) {
            Write-Host "Found DLL: $($dll.FullName)"
            Write-Host "FileVersion: $($dll.VersionInfo.FileVersion)"
            Write-Host "ProductVersion: $($dll.VersionInfo.ProductVersion)"
          } else {
            Write-Host "onnxruntime.dll not found under runtime directory"
          }

      - name: Install dependencies
        run: shards install --without-development --release

      - name: Test (non-Windows)
        if: ${{ matrix.os != 'windows' }}
        run: |
          echo "Using ONNX Runtime at: $ONNXRUNTIME_DIR"
          crystal spec

      - name: Test (Windows)
        if: ${{ matrix.os == 'windows' }}
        shell: pwsh
        run: |
          Write-Host "Using ONNX Runtime at: $env:ONNXRUNTIME_DIR"
          $runtime = $env:ONNXRUNTIME_DIR
          $libDir = Join-Path $runtime 'lib'
          $binDir = Join-Path $runtime 'bin'
          $specExe = Join-Path $PWD 'spec_windows.exe'
          crystal spec -o $specExe
          $ortDll = Join-Path $libDir 'onnxruntime.dll'
          if (Test-Path $ortDll) {
            Copy-Item -Path $ortDll -Destination (Join-Path $PWD 'onnxruntime.dll') -Force
          }
          $providersDll = Join-Path $libDir 'onnxruntime_providers_shared.dll'
          if (Test-Path $providersDll) {
            Copy-Item -Path $providersDll -Destination (Join-Path $PWD 'onnxruntime_providers_shared.dll') -Force
          }
          if (Test-Path $binDir) {
            $env:PATH = "$PWD;$binDir;$libDir;$env:SystemRoot\System32;$env:SystemRoot"
          } else {
            $env:PATH = "$PWD;$libDir;$env:SystemRoot\System32;$env:SystemRoot"
          }
          where.exe onnxruntime.dll
          & $specExe

      - name: Test with verbose output (non-Windows)
        if: ${{ failure() && matrix.os != 'windows' }}
        run: |
          crystal spec -v

      - name: Test with verbose output (Windows)
        if: ${{ failure() && matrix.os == 'windows' }}
        shell: pwsh
        run: |
          $runtime = $env:ONNXRUNTIME_DIR
          $libDir = Join-Path $runtime 'lib'
          $binDir = Join-Path $runtime 'bin'
          $specExe = Join-Path $PWD 'spec_windows_verbose.exe'
          crystal spec -v -o $specExe
          $ortDll = Join-Path $libDir 'onnxruntime.dll'
          if (Test-Path $ortDll) {
            Copy-Item -Path $ortDll -Destination (Join-Path $PWD 'onnxruntime.dll') -Force
          }
          $providersDll = Join-Path $libDir 'onnxruntime_providers_shared.dll'
          if (Test-Path $providersDll) {
            Copy-Item -Path $providersDll -Destination (Join-Path $PWD 'onnxruntime_providers_shared.dll') -Force
          }
          if (Test-Path $binDir) {
            $env:PATH = "$PWD;$binDir;$libDir;$env:SystemRoot\System32;$env:SystemRoot"
          } else {
            $env:PATH = "$PWD;$libDir;$env:SystemRoot\System32;$env:SystemRoot"
          }
          where.exe onnxruntime.dll
          & $specExe
